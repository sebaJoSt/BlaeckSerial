# =============================================================================
#  Waveform Generator — Home Assistant dashboard (Sections view)
# =============================================================================
#  Modern Sections layout using only built-in cards (no HACS required).
#
#  How to use:
#    1. Add the MQTT entities first (see mqtt-entities.yaml) and restart HA.
#    2. Settings → Dashboards → "+ Add dashboard" → "New dashboard from scratch".
#    3. Open it, top-right pencil (Edit) → three-dots menu → "Edit in YAML".
#    4. Replace the contents with this file, or copy the `views:` block into an
#       existing dashboard.
#
#  This dashboard uses helpers from command-routing.yaml for controls and keeps
#  telemetry from routed helper entities:
#    input_number.waveform_output_state
#    input_text.waveform_command_topic / waveform_state_topic
#    input_select.waveform_command_topic_mode
#    input_number.waveform_frequency_cmd / amplitude_cmd / offset_cmd
#    input_select.waveform_shape_cmd
#    input_boolean.waveform_enabled_cmd
# =============================================================================

title: Waveform Generator
views:
  - title: Waveform
    path: waveform
    icon: mdi:sine-wave
    type: sections
    max_columns: 2
    cards: []
    sections:
      # -------------------------- Topic routing ----------------------------
      - type: grid
        cards:
          - type: heading
            heading: Topic routing
            heading_style: title
            icon: mdi:sitemap-outline

          - type: entities
            entities:
              - entity: input_text.waveform_state_topic
                name: State topic
                icon: mdi:pound
              - entity: input_select.waveform_command_topic_mode
                name: Command topic
                icon: mdi:send
              - type: conditional
                conditions:
                  - entity: input_select.waveform_command_topic_mode
                    state: Custom
                row:
                  entity: input_text.waveform_command_topic
                  name: Custom command topic
                  icon: mdi:pencil
            state_color: false

      # ----------------------------- Monitor -------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Monitor
            heading_style: title
            icon: mdi:chart-line

          - type: gauge
            entity: input_number.waveform_output_state
            name: Output
            min: -30
            max: 30
            needle: true
            segments:
              - from: -30
                color: "#03A9F4"
              - from: -10
                color: "#4CAF50"
              - from: 10
                color: "#FF9800"
              - from: 20
                color: "#F44336"

      # ----------------------------- Controls ------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Controls
            heading_style: title
            icon: mdi:tune-variant

          - type: tile
            entity: input_boolean.waveform_enabled_cmd
            name: Output
            icon: mdi:power
            features_position: inline
            features:
              - type: toggle

          - type: tile
            entity: input_select.waveform_shape_cmd
            name: Waveform shape
            icon: mdi:waveform
            features:
              - type: select-options

          - type: tile
            entity: input_number.waveform_frequency_cmd
            name: Frequency
            icon: mdi:sine-wave
            features:
              - type: numeric-input
                style: slider

          - type: tile
            entity: input_number.waveform_amplitude_cmd
            name: Amplitude
            icon: mdi:arrow-expand-vertical
            features:
              - type: numeric-input
                style: slider

          - type: tile
            entity: input_number.waveform_offset_cmd
            name: Offset
            icon: mdi:arrow-up-down
            features:
              - type: numeric-input
                style: slider
